name: Build Windows QA Artifact (No Release)

# ==========================================
# 【発動条件】
# ==========================================
on:
  # 1) Actions 画面から手動実行できるようにする
  workflow_dispatch:

  # 2) feature/*, fix/*, chore/* 系ブランチへの push で自動実行
  #    例: feature/backend-handoff, fix/cors, chore/docs-sync
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"
    # ドキュメントのみ更新の push では QA ビルドを走らせない
    # （必要時は workflow_dispatch で手動実行）
    paths:
      - "src/**"
      - "src-tauri/**"
      - "backend/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vite.config.ts"
      - ".github/workflows/windows-qa-build.yml"

jobs:
  build-windows-qa:
    # クラウド上の Windows ランナーでビルドする
    runs-on: windows-latest

    # Release を作らないため最小権限（読み取りのみ）
    permissions:
      contents: read

    # 同一ブランチで新しい push が来たら古い実行はキャンセルし、待ち時間を減らす
    concurrency:
      group: windows-qa-${{ github.ref }}
      cancel-in-progress: true

    steps:
      # ==========================================
      # Step 0: ソースコード取得
      # ==========================================
      - name: Checkout repository
        uses: actions/checkout@v6

      # ==========================================
      # Step 1: Python backend のビルド準備
      # ==========================================
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          # 依存キャッシュで2回目以降を高速化
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        working-directory: ./backend
        # lockfile 固定で再現性を担保
        run: uv sync --frozen

      - name: Build Python executable
        working-directory: ./backend
        # backend.exe を生成
        run: uv run python build_exe.py

      - name: Move backend executable for Tauri
        # Tauri が期待する命名に合わせて sidecar 実行ファイルを配置
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/bin
          Move-Item -Path backend/dist/backend.exe -Destination src-tauri/bin/backend-x86_64-pc-windows-msvc.exe

      # ==========================================
      # Step 2: Frontend/Tauri のビルド準備
      # ==========================================
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      # ==========================================
      # Step 3: Windows 向け Tauri バンドルを作成
      # ==========================================
      - name: Build Tauri app (Windows bundle)
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      # ==========================================
      # Step 4: GitHub Release には公開せず Artifact のみ保存
      # ==========================================
      - name: Upload Windows bundles as artifact
        uses: actions/upload-artifact@v7
        with:
          # ダウンロード時に識別しやすい名前
          name: nanopol-windows-qa-${{ github.run_number }}
          # 生成された bundle 一式を保存（exe/msi など）
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**
          if-no-files-found: error
          # 保持期間（必要に応じて延長可）
          retention-days: 14
