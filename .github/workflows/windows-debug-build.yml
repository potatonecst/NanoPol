name: Build Windows Debug Artifact (Manual)

# ==========================================
# 【発動条件】
# ==========================================
on:
  # 解析用は原則手動実行のみ。
  # （毎 push で回すと重くなるため）
  workflow_dispatch:

jobs:
  build-windows-debug:
    # クラウド上の Windows ランナーでビルドする
    runs-on: windows-latest

    # Release は作らないため最小権限
    permissions:
      contents: read

    # 手動連打時に古いジョブを止める
    concurrency:
      group: windows-debug-${{ github.ref }}
      cancel-in-progress: true

    steps:
      # ==========================================
      # Step 0: ソースコード取得
      # ==========================================
      - name: Checkout repository
        uses: actions/checkout@v6

      # ==========================================
      # Step 1: Python backend のビルド準備
      # ==========================================
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        working-directory: ./backend
        run: uv sync --frozen

      - name: Build Python executable
        working-directory: ./backend
        run: uv run python build_exe.py

      - name: Move backend executable for Tauri
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/bin
          Move-Item -Path backend/dist/backend.exe -Destination src-tauri/bin/backend-x86_64-pc-windows-msvc.exe

      # ==========================================
      # Step 2: Frontend/Tauri のビルド準備
      # ==========================================
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      # ==========================================
      # Step 3: Debug バンドル作成
      # ==========================================
      - name: Build Tauri app (Debug bundle)
        # --debug を付けて解析向けビルドを作成
        run: pnpm tauri build --debug --target x86_64-pc-windows-msvc

      # ==========================================
      # Step 4: Artifact として保存（公開しない）
      # ==========================================
      - name: Upload Windows debug bundles as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanopol-windows-debug-${{ github.run_number }}
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/debug/bundle/**
          if-no-files-found: error
          retention-days: 14
